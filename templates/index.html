<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>lorian-ct · AI错题本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FBF7F0;--card:#FFF;--border:#E8E2D6;
  --sidebar-bg:#1C1F2E;--sidebar-hover:#262940;--sidebar-active:#2F3350;
  --sidebar-text:#9B9BB0;--sidebar-bright:#E8E8F0;
  --accent:#E85D4A;--accent-hover:#D44A38;--accent-light:#FFF0ED;
  --green:#3BA676;--green-light:#E8F8EF;
  --yellow:#E8A838;--yellow-light:#FFF8E8;
  --blue:#4A8FE7;--blue-light:#EBF3FF;
  --purple:#8B6CC1;--purple-light:#F3EEFF;
  --text:#2C2C36;--text-sec:#6E6E80;--text-muted:#A0A0B0;
  --user-bg:#F0EBE0;--ai-bg:#FFF;
  --sidebar-w:280px;
  --font:'LXGW WenKai',serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;font-family:var(--font);color:var(--text);background:var(--bg);overflow:hidden}
body{display:flex}

.sidebar{width:var(--sidebar-w);height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s;z-index:100}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),#F09060);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff}
.logo h1{font-size:18px;font-weight:700;color:var(--sidebar-bright)}
.logo p{font-size:12px;color:var(--sidebar-text);margin-top:2px}

.btn-new{margin:16px 16px 8px;padding:12px 16px;background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.15);border-radius:10px;color:var(--sidebar-bright);font-family:var(--font);font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.btn-new:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
.btn-new span{font-size:18px;font-weight:300}

.session-list{flex:1;overflow-y:auto;padding:8px}
.session-list::-webkit-scrollbar{width:4px}
.session-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.session-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px;position:relative}
.session-item:hover{background:var(--sidebar-hover)}
.session-item.active{background:var(--sidebar-active)}
.session-subject{font-size:10px;padding:2px 6px;border-radius:4px;flex-shrink:0;font-weight:700}
.session-title{flex:1;font-size:13px;color:var(--sidebar-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item.active .session-title{color:var(--sidebar-bright)}
.mastered-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.session-del{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;background:0 0;color:var(--sidebar-text);font-size:16px;cursor:pointer;border-radius:4px;opacity:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.session-item:hover .session-del{opacity:1}
.session-del:hover{background:rgba(232,93,74,.2);color:var(--accent)}

.sub-数学{background:rgba(74,143,231,.15);color:#7AB3F0}
.sub-物理{background:rgba(139,108,193,.15);color:#B090D8}
.sub-化学{background:rgba(59,166,118,.15);color:#6BC89A}
.sub-英语{background:rgba(232,168,56,.15);color:#F0C060}
.sub-语文{background:rgba(232,93,74,.15);color:#F08070}
.sub-其他{background:rgba(255,255,255,.08);color:#888}

.main{flex:1;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hidden{display:none!important}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.overlay.show{display:block}

#sWelcome{align-items:center;justify-content:center}
.welcome{text-align:center;max-width:480px;padding:40px 20px;animation:fadeUp .6s ease}
.welcome-icon{font-size:64px;margin-bottom:24px;animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.welcome h2{font-size:28px;font-weight:700;margin-bottom:12px}
.welcome-desc{font-size:16px;color:var(--text-sec);line-height:1.8;margin-bottom:36px}
.welcome-steps{display:flex;flex-direction:column;gap:14px;margin-bottom:36px;text-align:left}
.step{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--card);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.step-num{width:28px;height:28px;background:var(--accent-light);color:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.step span:last-child{font-size:14px;color:var(--text-sec)}
.btn-start{padding:14px 32px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-start:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,93,74,.3)}

#sForm{align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.form-card{background:var(--card);border-radius:16px;padding:36px;max-width:560px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,.06);animation:fadeUp .4s ease}
.form-card h2{font-size:22px;margin-bottom:28px;text-align:center}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:14px;font-weight:700;color:var(--text-sec);margin-bottom:8px}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:0 0;font-family:var(--font);font-size:13px;color:var(--text-sec);cursor:pointer;transition:all .2s}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.on{background:var(--accent);border-color:var(--accent);color:#fff}
.form-group textarea{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-family:var(--font);font-size:15px;color:var(--text);background:var(--bg);resize:vertical;transition:border-color .2s;line-height:1.6}
.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,93,74,.1)}
.form-group textarea::placeholder{color:var(--text-muted)}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:28px}
.btn-cancel{padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:0 0;font-family:var(--font);font-size:14px;color:var(--text-sec);cursor:pointer;transition:all .2s}
.btn-cancel:hover{background:var(--bg)}
.btn-submit{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-submit:hover{background:var(--accent-hover)}

#sChat{display:flex;flex-direction:column}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.8);backdrop-filter:blur(8px);flex-shrink:0}
.chat-hdr-l{display:flex;align-items:center;gap:12px}
.btn-back{padding:4px 8px;border:none;background:0 0;font-family:var(--font);font-size:13px;color:var(--text-muted);cursor:pointer;transition:color .2s}
.btn-back:hover{color:var(--text)}
.chat-title{font-size:15px;font-weight:700;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
.sub-tag.sub-数学{background:var(--blue-light);color:var(--blue)}
.sub-tag.sub-物理{background:var(--purple-light);color:var(--purple)}
.sub-tag.sub-化学{background:var(--green-light);color:var(--green)}
.sub-tag.sub-英语{background:var(--yellow-light);color:var(--yellow)}
.sub-tag.sub-语文{background:var(--accent-light);color:var(--accent)}
.sub-tag.sub-其他{background:#F0F0F0;color:#888}
.btn-mastered{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:0 0;font-family:var(--font);font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .2s}
.btn-mastered:hover{border-color:var(--green);color:var(--green)}
.btn-mastered.is-m{background:var(--green-light);border-color:var(--green);color:var(--green)}

.chat-msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.chat-msgs::-webkit-scrollbar{width:6px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeUp .3s ease}
.msg-user{align-self:flex-end;flex-direction:row-reverse}
.msg-ai{align-self:flex-start}
.msg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.msg-user .msg-av{background:var(--accent-light);color:var(--accent)}
.msg-ai .msg-av{background:linear-gradient(135deg,var(--accent),#F09060);color:#fff}
.msg-bubble{padding:12px 16px;border-radius:16px;line-height:1.75;font-size:15px;word-break:break-word}
.msg-user .msg-bubble{background:var(--user-bg);border-bottom-right-radius:4px}
.msg-ai .msg-bubble{background:var(--ai-bg);box-shadow:0 1px 3px rgba(0,0,0,.04);border-bottom-left-radius:4px}
.msg-content p{margin-bottom:8px}.msg-content p:last-child{margin-bottom:0}
.msg-content strong{color:var(--accent)}
.msg-content code{font-family:var(--mono);font-size:13px;background:rgba(0,0,0,.05);padding:2px 6px;border-radius:4px}
.msg-content pre{background:#1E1E2E;color:#CDD6F4;padding:16px;border-radius:10px;overflow-x:auto;margin:10px 0;font-size:13px;line-height:1.6}
.msg-content pre code{background:0 0;padding:0;color:inherit}
.msg-content ol,.msg-content ul{padding-left:20px;margin:8px 0}
.msg-content li{margin-bottom:4px}
.msg-content blockquote{border-left:3px solid var(--accent);padding-left:12px;margin:8px 0;color:var(--text-sec)}

.typing{display:flex;gap:4px;padding:4px 0}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--text-muted);animation:dotB 1.4s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes dotB{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

.chat-input{display:flex;align-items:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border);background:rgba(255,255,255,.8);backdrop-filter:blur(8px);flex-shrink:0}
.chat-input textarea{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:12px;font-family:var(--font);font-size:15px;color:var(--text);background:var(--card);resize:none;max-height:160px;line-height:1.5;transition:border-color .2s}
.chat-input textarea:focus{outline:none;border-color:var(--accent)}
.chat-input textarea::placeholder{color:var(--text-muted)}
.btn-send{width:42px;height:42px;border:none;background:var(--accent);color:#fff;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.btn-send:hover{background:var(--accent-hover);transform:scale(1.05)}
.btn-send:disabled{opacity:.5;cursor:not-allowed;transform:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.mob-btn{display:none;position:fixed;top:12px;left:12px;z-index:200;width:40px;height:40px;border:none;background:var(--card);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.06);font-size:18px;cursor:pointer;align-items:center;justify-content:center}
@media(max-width:768px){
  .mob-btn{display:flex}
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.3)}
  .chat-header{padding-left:56px}
  .welcome h2{font-size:22px}
  .form-card{padding:24px}
  .msg{max-width:95%}
}

.katex{font-size:1.05em!important}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <span class="logo-icon">🌧️</span>
      <div><h1>lorian-ct</h1><p>AI 错题本</p></div>
    </div>
  </div>
  <button class="btn-new" onclick="showForm()"><span>+</span> 记录新错题</button>
  <div class="session-list" id="sList"></div>
</aside>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<button class="mob-btn" onclick="openSidebar()">☰</button>

<div class="main">
  <div class="screen" id="sWelcome">
    <div class="welcome">
      <div class="welcome-icon">📖</div>
      <h2>欢迎使用lorian-ct</h2>
      <p class="welcome-desc">输入你的错题，我不会直接告诉你答案，<br>而是一步步引导你自己想明白。</p>
      <div class="welcome-steps">
        <div class="step"><span class="step-num">1</span><span>输入错题和你的错误答案</span></div>
        <div class="step"><span class="step-num">2</span><span>我会分析你的错误原因</span></div>
        <div class="step"><span class="step-num">3</span><span>通过提问引导你找到正确思路</span></div>
      </div>
      <button class="btn-start" onclick="showForm()">开始纠错 →</button>
    </div>
  </div>

  <div class="screen hidden" id="sForm">
    <div class="form-card">
      <h2>📝 记录一道新错题</h2>
      <div class="form-group">
        <label>学科</label>
        <div class="pills" id="pills">
          <button class="pill on" data-s="数学">📐 数学</button>
          <button class="pill" data-s="物理">⚡ 物理</button>
          <button class="pill" data-s="化学">🧪 化学</button>
          <button class="pill" data-s="英语">🔤 英语</button>
          <button class="pill" data-s="语文">📖 语文</button>
          <button class="pill" data-s="其他">📌 其他</button>
        </div>
      </div>
      <div class="form-group">
        <label>题目内容</label>
        <textarea id="inQ" rows="4" placeholder="把题目抄在这里……"></textarea>
      </div>
      <div class="form-group">
        <label>我的错误答案</label>
        <textarea id="inA" rows="3" placeholder="你当时是怎么做的？"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="hideForm()">取消</button>
        <button class="btn-submit" onclick="submitQ()">开始分析 →</button>
      </div>
    </div>
  </div>

  <div class="screen hidden" id="sChat">
    <div class="chat-header">
      <div class="chat-hdr-l">
        <button class="btn-back" onclick="goWelcome()">← 返回</button>
        <span class="chat-title" id="cTitle"></span>
        <span class="sub-tag" id="cTag"></span>
      </div>
      <button class="btn-mastered" id="cMastered" onclick="toggleMastered()">⬜ 标记已掌握</button>
    </div>
    <div class="chat-msgs" id="cMsgs"></div>
    <div class="chat-input">
      <textarea id="cInput" placeholder="输入你的想法……（Enter 发送，Shift+Enter 换行）" rows="1"></textarea>
      <button class="btn-send" id="cSend" onclick="sendMsg()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script>
const S = { sessions: [], sid: null, subject: '数学', loading: false };

async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}

async function loadSessions() {
  S.sessions = await api('GET', '/api/sessions');
  renderList();
}

function renderList() {
  const el = document.getElementById('sList');
  if (!S.sessions.length) {
    el.innerHTML = '<p style="color:var(--sidebar-text);text-align:center;padding:32px 16px;font-size:13px;">还没有错题记录<br>点击上方按钮开始<br><br>© 落雨纪元.Inc</p>';
    return;
  }
  el.innerHTML = S.sessions.map(s => `
    <div class="session-item ${s.id===S.sid?'active':''}" data-id="${s.id}" onclick="openSession('${s.id}')">
      <span class="session-subject sub-${s.subject}">${s.subject}</span>
      <span class="session-title">${esc(s.title)}</span>
      ${s.mastered ? '<span class="mastered-dot"></span>' : ''}
      <button class="session-del" onclick="event.stopPropagation();delSession('${s.id}')">×</button>
    </div>`).join('');
}

async function delSession(id) {
  if (!confirm('确定删除这道错题？')) return;
  await api('DELETE', '/api/sessions/' + id);
  if (S.sid === id) { S.sid = null; showScreen('sWelcome'); }
  await loadSessions();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function showForm() {
  closeSidebar();
  showScreen('sForm');
  document.getElementById('inQ').value = '';
  document.getElementById('inA').value = '';
  document.getElementById('inQ').focus();
}

function hideForm() {
  showScreen(S.sid ? 'sChat' : 'sWelcome');
}

function goWelcome() {
  S.sid = null;
  showScreen('sWelcome');
  renderList();
}

async function openSession(id) {
  S.sid = id;
  closeSidebar();
  const s = S.sessions.find(x => x.id === id);
  document.getElementById('cTitle').textContent = s.title;
  const tag = document.getElementById('cTag');
  tag.textContent = s.subject;
  tag.className = 'sub-tag sub-' + s.subject;
  updMastered(s.mastered);
  showScreen('sChat');

  const msgs = await api('GET', '/api/sessions/' + id + '/messages');
  const el = document.getElementById('cMsgs');
  el.innerHTML = msgs.map(m => msgHTML(m)).join('');
  scrollBottom();
  doMath();
  renderList();
}

async function toggleMastered() {
  if (!S.sid) return;
  const r = await api('PUT', '/api/sessions/' + S.sid + '/mastered');
  updMastered(r.mastered);
  await loadSessions();
}

function updMastered(v) {
  const b = document.getElementById('cMastered');
  b.textContent = v ? '✅ 已掌握' : '⬜ 标记已掌握';
  b.classList.toggle('is-m', !!v);
}

async function submitQ() {
  const q = document.getElementById('inQ').value.trim();
  const a = document.getElementById('inA').value.trim();
  if (!q) { document.getElementById('inQ').focus(); return; }

  const title = q.slice(0,30) + (q.length>30 ? '...' : '');
  const s = await api('POST', '/api/sessions', { title: title, subject: S.subject });
  S.sid = s.id;
  await loadSessions();

  document.getElementById('cTitle').textContent = s.title;
  const tag = document.getElementById('cTag');
  tag.textContent = s.subject;
  tag.className = 'sub-tag sub-' + s.subject;
  updMastered(0);
  showScreen('sChat');
  renderList();

  let msg = '【题目】\n' + q;
  if (a) msg += '\n\n【我的错误答案】\n' + a;

  document.getElementById('cMsgs').innerHTML = '';
  appendMsg({ role:'user', content:msg });
  await aiReply(msg);
}

async function sendMsg() {
  const inp = document.getElementById('cInput');
  const text = inp.value.trim();
  if (!text || S.loading) return;
  inp.value = '';
  inp.style.height = 'auto';
  appendMsg({ role:'user', content:text });
  await aiReply(text);
}

async function aiReply(text) {
  showTyping();
  S.loading = true;
  document.getElementById('cSend').disabled = true;
  try {
    const r = await api('POST', '/api/chat', { session_id: S.sid, message: text });
    hideTyping();
    appendMsg({ role:'assistant', content:r.message });
    await loadSessions();
  } catch(e) {
    hideTyping();
    appendMsg({ role:'assistant', content:'网络出错了，请稍后重试。' });
  }
  S.loading = false;
  document.getElementById('cSend').disabled = false;
}

function msgHTML(m) {
  const u = m.role === 'user';
  return '<div class="msg ' + (u?'msg-user':'msg-ai') + '">' +
    (u ? '' : '<div class="msg-av">🌧️</div>') +
    '<div class="msg-bubble"><div class="msg-content">' + md(m.content) + '</div></div>' +
    (u ? '<div class="msg-av">我</div>' : '') +
  '</div>';
}

function appendMsg(m) {
  document.getElementById('cMsgs').insertAdjacentHTML('beforeend', msgHTML(m));
  scrollBottom();
  doMath();
}

function md(t) {
  try { return marked.parse(t); }
  catch(e) { return t.replace(/\n/g,'<br>'); }
}

function doMath() {
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(document.getElementById('cMsgs'), {
      delimiters: [
        {left:'$$',right:'$$',display:true},
        {left:'$',right:'$',display:false},
        {left:'\\(',right:'\\)',display:false},
        {left:'\\[',right:'\\]',display:true}
      ],
      throwOnError: false
    });
  }
}

function showTyping() {
  document.getElementById('cMsgs').insertAdjacentHTML('beforeend',
    '<div class="msg msg-ai" id="typingDot"><div class="msg-av">l</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>');
  scrollBottom();
}

function hideTyping() {
  const e = document.getElementById('typingDot');
  if (e) e.remove();
}

function scrollBottom() {
  const c = document.getElementById('cMsgs');
  c.scrollTop = c.scrollHeight;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('pills').addEventListener('click', function(e) {
  const p = e.target.closest('.pill');
  if (!p) return;
  document.querySelectorAll('#pills .pill').forEach(function(x) { x.classList.remove('on'); });
  p.classList.add('on');
  S.subject = p.dataset.s;
});

var cInput = document.getElementById('cInput');
cInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
cInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

marked.setOptions({ breaks:true, gfm:true });
loadSessions();
</script>
</body>
</html>
