<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Lorian-ct · AI错题本</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <span class="logo-icon">🌧️</span>
            <div>
                <h1>lorian-ct</h1>
                <p>AI 错题本</p>
            </div>
        </div>
    </div>
    <button class="btn-new" onclick="showForm()"><span>+</span> 记录新错题</button>
    <button class="btn-settings" onclick="showSettings()">⚙️ API 设置</button>
    <div class="session-list" id="sList"></div>
</aside>

<!-- 遮罩层 -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<button class="mob-btn" onclick="openSidebar()">☰</button>

<!-- 主内容区 -->
<div class="main">

    <!-- 欢迎页 -->
    <div class="screen" id="sWelcome">
        <div class="welcome">
            <div class="welcome-icon">📖</div>
            <h2>lorain-ct · AI错题本</h2>
            <p class="welcome-desc">
                输入你的错题，我不会直接告诉你答案，<br>
                而是一步步引导你自己想明白。
            </p>
            <div class="welcome-steps">
                <div class="step"><span class="step-num">1</span><span>输入错题和你的错误答案</span></div>
                <div class="step"><span class="step-num">2</span><span>我会分析你的错误原因</span></div>
                <div class="step"><span class="step-num">3</span><span>通过提问引导你找到正确思路</span></div>
            </div>
            <button class="btn-start" onclick="showForm()">开始纠错 →</button>
            <div style="margin-top:36px;padding-top:24px;border-top:1px solid var(--border);">
                <p style="font-size:13px;color:var(--text-muted);line-height:1.8;">
                    此产品由 <strong style="color:var(--text-sec);">落雨纪元</strong> 所开发发行<br>
                    官网: www.luoyeltd.com.cn　｜　博客: blog.luoyeltd.com.cn<br>
                    <span style="font-size:12px;">© 落雨纪元算法与数据研究中心团队 · 第一代测试版</span>
                </p>
            </div>
        </div>
    </div>

    <!-- 设置页 -->
    <div class="screen hidden" id="sSettings">
        <div class="settings-card">
            <h2>⚙️ API 设置</h2>
            <p class="sub">配置你的 AI 服务，填好后点击保存并测试</p>
            <div class="form-group">
                <label>选择服务商</label>
                <div class="provider-pills" id="providerPills">
                    <button class="pill on" data-url="https://api.deepseek.com" data-model="deepseek-chat" data-hint="DeepSeek" data-reg="https://platform.deepseek.com">DeepSeek</button>
                    <button class="pill" data-url="https://api.xiaomimimo.com/v1" data-model="mimo-v2.5-pro" data-hint="Xiaomi MIMO" data-reg="https://platform.xiaomimimo.com">Xiaomi MIMO</button>
                    <button class="pill" data-url="https://token-plan-cn.xiaomimimo.com/v1" data-model="mimo-v2.5-pro" data-hint="Xiaomi MIMO 会员版" data-reg="https://platform.xiaomimimo.com">Xiaomi MIMO 会员版</button>
                    <button class="pill" data-url="https://dashscope.aliyuncs.com/compatible-mode/v1" data-model="qwen-plus" data-hint="通义千问" data-reg="https://dashscope.console.aliyun.com">通义千问</button>
                    <button class="pill" data-url="https://api.openai.com/v1" data-model="gpt-4o-mini" data-hint="OpenAI" data-reg="https://platform.openai.com">OpenAI</button>
                    <button class="pill" data-url="https://api.moonshot.cn/v1" data-model="moonshot-v1-8k" data-hint="月之暗面 Kimi" data-reg="https://platform.moonshot.cn">月之暗面</button>
                    <button class="pill" data-url="https://open.bigmodel.cn/api/paas/v4" data-model="glm-4-flash" data-hint="智谱AI" data-reg="https://open.bigmodel.cn">智谱AI</button>
                </div>
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="cfgKey" placeholder="sk-xxxxxxxxxxxxxxxx">
                <p class="hint" id="providerHint">DeepSeek: <a href="https://platform.deepseek.com" target="_blank" id="providerLink">platform.deepseek.com</a> 注册后获取</p>
            </div>
            <div class="form-group">
                <label>API 地址</label>
                <input type="text" id="cfgUrl" placeholder="https://api.deepseek.com">
            </div>
            <div class="form-group">
                <label>模型名称</label>
                <input type="text" id="cfgModel" placeholder="deepseek-chat">
            </div>
            <div class="test-result" id="testResult"></div>
            <div class="settings-actions">
                <button class="btn-skip" onclick="goWelcome()">返回</button>
                <button class="btn-save" onclick="saveSettings()">保存并测试</button>
            </div>
        </div>
    </div>

    <!-- 表单页 -->
    <div class="screen hidden" id="sForm">
        <div class="form-card">
            <h2>📝 记录一道新错题</h2>
            <div class="form-group">
                <label>学科</label>
                <div class="pills" id="pills">
                    <button class="pill on" data-s="数学">📐 数学</button>
                    <button class="pill" data-s="物理">⚡ 物理</button>
                    <button class="pill" data-s="化学">🧪 化学</button>
                    <button class="pill" data-s="英语">🔤 英语</button>
                    <button class="pill" data-s="语文">📖 语文</button>
                    <button class="pill" data-s="其他">📌 其他</button>
                </div>
            </div>
            <div class="form-group">
                <label>题目内容</label>
                <textarea id="inQ" rows="4" placeholder="把题目抄在这里……"></textarea>
            </div>
            <div class="form-group">
                <label>我的错误答案</label>
                <textarea id="inA" rows="3" placeholder="你当时是怎么做的？"></textarea>
            </div>
            <div class="form-actions">
                <button class="btn-cancel" onclick="hideForm()">取消</button>
                <button class="btn-submit" onclick="submitQ()">开始分析 →</button>
            </div>
        </div>
    </div>

    <!-- 聊天页 -->
    <div class="screen hidden" id="sChat">
        <div class="chat-header">
            <div class="chat-hdr-l">
                <button class="btn-back" onclick="goWelcome()">← 返回</button>
                <span class="chat-title" id="cTitle"></span>
                <span class="sub-tag" id="cTag"></span>
            </div>
            <button class="btn-mastered" id="cMastered" onclick="toggleMastered()">⬜ 标记已掌握</button>
        </div>
        <div class="chat-msgs" id="cMsgs"></div>
        <div class="chat-input">
            <textarea id="cInput" rows="1" placeholder="输入你的想法... (Enter 发送，Shift+Enter 换行)"></textarea>
            <button class="btn-send" id="cSend" onclick="sendMsg()">➤</button>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
